<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>네비게이토 180 암송카드</title>
<style>
:root {
  --bg:       #0f1923;
  --surface:  #1e2f42;
  --surface2: #223044;
  --border:   rgba(180,150,80,.35);
  --gold:     #c9a84c;
  --gold-dim: rgba(201,168,76,.45);
  --gold-bg:  rgba(201,168,76,.08);
  --gold-pale:#e8d4a0;
  --cream:    #ede8d8;
  --muted:    #8a9ab0;
  --miss:     #e07060;
  --miss-bg:  rgba(224,112,96,.10);
  --miss-bd:  rgba(224,112,96,.30);
  --done:     #4caf7d;
  --done-bg:  rgba(76,175,125,.10);
  --done-bd:  rgba(76,175,125,.30);
  --cat1:     #5b9fd4;
  --cat2:     #d47a5b;
  --cat3:     #5bb87a;
  --cat4:     #9b7bd4;
  --cat5:     #c9a84c;
  --radius:   12px;
  --header-h: 52px;
  --ctrl-h:   44px;
  --ctrlb-h:  52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background: var(--bg);
  color: var(--cream);
  display: flex;
  flex-direction: column;
}

/* ── 헤더 ── */
.app-header {
  height: var(--header-h);
  min-height: var(--header-h);
  width: 100%;
  background: var(--surface);
  border-bottom: 2px solid var(--gold);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header-text { display: flex; flex-direction: column; flex: 1; }
.app-title { font-size: .95rem; font-weight: 700; color: var(--gold); }
.app-title strong { color: var(--gold); }
.app-subtitle { font-size: .68rem; color: var(--muted); }

/* ── 카테고리 필터 ── */
.cat-filter {
  height: var(--ctrl-h);
  min-height: var(--ctrl-h);
  display: flex;
  gap: 6px;
  padding: 0 14px;
  overflow-x: auto;
  width: 100%;
  scrollbar-width: none;
  flex-shrink: 0;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cat-filter::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: all .18s;
  white-space: nowrap;
  font-family: inherit;
}
.cat-chip.active-all { background: var(--gold); color: #1a1400; border-color: var(--gold); font-weight: 700; }
.cat-chip.active-1   { background: var(--cat1); color: #fff; border-color: var(--cat1); }
.cat-chip.active-2   { background: var(--cat2); color: #fff; border-color: var(--cat2); }
.cat-chip.active-3   { background: var(--cat3); color: #fff; border-color: var(--cat3); }
.cat-chip.active-4   { background: var(--cat4); color: #fff; border-color: var(--cat4); }
.cat-chip.active-5   { background: var(--cat5); color: #1a1400; border-color: var(--cat5); }

/* ── 카드 스크롤 영역 ── */
.card-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px 8px;
}
.card-wrap::-webkit-scrollbar { width: 3px; }
.card-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── 개별 암송 카드 ── */
.mem-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mem-card:hover { border-color: var(--gold-dim); }

/* 카드 상단 배너 */
.card-banner {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.card-banner.cat-bg-1 { background: linear-gradient(135deg,rgba(91,159,212,.18),rgba(91,159,212,.06)); }
.card-banner.cat-bg-2 { background: linear-gradient(135deg,rgba(212,122,91,.18),rgba(212,122,91,.06)); }
.card-banner.cat-bg-3 { background: linear-gradient(135deg,rgba(91,184,122,.18),rgba(91,184,122,.06)); }
.card-banner.cat-bg-4 { background: linear-gradient(135deg,rgba(155,123,212,.18),rgba(155,123,212,.06)); }
.card-banner.cat-bg-5 { background: linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.06)); }

.banner-roman {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 2.5rem; font-weight: 700; line-height: 1;
  opacity: .07; color: var(--cream); pointer-events: none; user-select: none;
}
.banner-cat { font-size: .58rem; letter-spacing: .12em; color: var(--muted); margin-bottom: 3px; }
.banner-topic { font-size: .88rem; font-weight: 700; color: var(--cream); line-height: 1.35; }
.banner-addr {
  display: inline-block;
  margin-top: 5px;
  font-size: .78rem;
  font-weight: 700;
  color: var(--gold);
  background: var(--gold-bg);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 2px 10px;
  letter-spacing: .05em;
}

/* 구절 본문 영역 */
.card-verse {
  padding: 12px 14px 14px;
  font-size: .93rem;
  line-height: 1.85;
  color: rgba(237,232,216,.9);
  word-break: keep-all;
  transition: filter .25s, opacity .25s;
  position: relative;
}

/* ══ 암송 모드: 구절 숨김 ══ */
.hide-verse .card-verse {
  filter: blur(6px);
  opacity: .25;
  user-select: none;
}
.hide-verse.revealed .card-verse {
  filter: none;
  opacity: 1;
}

/* 힌트 (암송 모드에서만 보임) */
.card-hint {
  display: none;
  padding: 0 14px 10px;
  font-size: .65rem;
  color: var(--gold-dim);
  letter-spacing: .05em;
}
.hide-verse .card-hint { display: block; }
.hide-verse.revealed .card-hint { display: none; }

/* ── 하단 컨트롤 ── */
.controls-wrap {
  height: var(--ctrlb-h);
  min-height: var(--ctrlb-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* 진행 정보 */
.prog-info {
  display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;
}
.prog-track {
  flex: 1; height: 3px;
  background: rgba(201,168,76,.12);
  border-radius: 2px; overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #e8c96a);
  border-radius: 2px;
  transition: width .4s;
}
.prog-text { font-size: .7rem; color: var(--muted); white-space: nowrap; }

/* 버튼들 */
.ctrl-btn {
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: inherit;
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  padding: 0 12px;
  display: flex; align-items: center; gap: 4px;
}
.ctrl-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.ctrl-btn.active { background: var(--gold); color: #1a1400; border-color: var(--gold); }
.ctrl-btn.nav { width: 34px; padding: 0; justify-content: center; font-size: .85rem; }
.ctrl-btn:disabled { opacity: .3; cursor: default; }
.ctrl-btn:not(:disabled):active { transform: scale(.96); }

/* 재시험 배너 */
.retry-banner {
  display: none;
  background: var(--miss-bg);
  border: 1px solid var(--miss-bd);
  border-radius: 6px;
  padding: 5px 14px;
  text-align: center;
  font-size: .7rem;
  font-weight: 600;
  color: var(--miss);
  margin: 0 14px;
  flex-shrink: 0;
}
.retry-banner.show { display: block; }

/* 빈 상태 */
.empty-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: .88rem;
  line-height: 2;
}

/* ── 모바일 ── */
@media (max-width: 480px) {
  .app-title { font-size: .88rem; }
  .card-verse { font-size: .88rem; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="app-header">
  <div style="font-size:1.3rem;color:var(--gold);flex-shrink:0;">✟</div>
  <div class="header-text">
    <div class="app-title">네비게이토 <strong>TMS 180</strong></div>
    <div class="app-subtitle">은혜가풍성한교회</div>
  </div>
  <button onclick="goHomeSafe()" style="display:flex;align-items:center;gap:5px;padding:6px 13px;background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:20px;color:var(--gold);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;">⬅ 홈</button>
</div>

<!-- 카테고리 필터 -->
<div class="cat-filter" id="catFilter">
  <button class="cat-chip" data-cat="all" onclick="selectCat('all')">전체</button>
  <button class="cat-chip" data-cat="1" onclick="selectCat('1')">Ⅰ 하나님</button>
  <button class="cat-chip" data-cat="2" onclick="selectCat('2')">Ⅱ 사랑</button>
  <button class="cat-chip" data-cat="3" onclick="selectCat('3')">Ⅲ 믿음</button>
  <button class="cat-chip" data-cat="4" onclick="selectCat('4')">Ⅳ 승리</button>
  <button class="cat-chip" data-cat="5" onclick="selectCat('5')">Ⅴ 전도</button>
</div>

<!-- 카드 스크롤 영역 -->
<div class="card-wrap" id="cardWrap"></div>

<!-- 하단 컨트롤 -->
<div class="controls-wrap">
  <button class="ctrl-btn nav" id="btnPrev" onclick="move(-1)" title="이전">◀</button>

  <div class="prog-info">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <span class="prog-text" id="progText">1–3 / 180</span>
  </div>

  <button class="ctrl-btn" id="btnMem" onclick="toggleMemMode()" title="암송 모드 토글">✍ 암송</button>
  <button class="ctrl-btn" id="btnShuffle" onclick="toggleShuffle()" title="순서 섞기">🔀</button>

  <button class="ctrl-btn nav" id="btnNext" onclick="move(1)" title="다음">▶</button>
</div>

<script>

const CAT_MAP  = { '1':'Ⅰ','2':'Ⅱ','3':'Ⅲ','4':'Ⅳ','5':'Ⅴ' };
const CAT_BG   = { '1':'cat-bg-1','2':'cat-bg-2','3':'cat-bg-3','4':'cat-bg-4','5':'cat-bg-5' };
const CARDS_PER_PAGE = 3;
const LS_POS   = 'nav180r_page';
const LS_DONE  = 'nav180r_done';
const LS_RETRY = 'nav180r_retry';
const LS_CAT   = 'nav180r_cat';
const LS_SHUF  = 'nav180r_shuf';

": "두루 다니며 한담하는 자는 남의 비밀을 누설하나 마음이 신실한 자는 그런 것을 숨기느니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "3. 은혜스럽게 말함", "a": "골4:4-6", "v": "그리하면 내가 마땅히 할 말로써 이 비밀을 나타내리라 외인을 향하여서는 지혜로 행하여 세월을 아끼라 너희 말을 항상 은혜 가운데서 소금으로 고루게 함같이 하라 그리하면 각 사람에게 마땅히 대답할 것을 알리라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "3. 은혜스럽게 말함", "a": "잠15:1", "v": "유순한 대답은 분노를 쉬게 하여도 과격한 말은 노를 격동하느니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "4. 죄를 시인함", "a": "약5:16", "v": "이러므로 너희 죄를 서로 고하며 병 낫기를 위하여 서로 기도하라 의인의 간구는 역사하는 힘이 많으니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "4. 죄를 시인함", "a": "마5:23-24", "v": "그러므로 예물을 제단에 드리다가 거기서 네 형제에게 원망들을 만한 일이 있는 줄 생각나거든 예물을 제단 앞에 두고 먼저 가서 형제와 화목하고 그 후에 와서 예물을 드리라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "5. 경청함", "a": "약1:19", "v": "내 사랑하는 형제들아 너희가 알거니와 사람마다 듣기는 속히 하고 말하기는 더디 하며 성내기도 더디 하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "5. 경청함", "a": "잠18:13", "v": "사연을 듣기 전에 대답하는 자는 미련하여 욕을 당하느니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "6. 책망을 받아들임", "a": "잠9:8-9", "v": "거만한 자를 책망하지 말라 그가 너를 미워할까 두려우니라 지혜 있는 자를 책망하라 그가 너를 사랑하리라 지혜 있는 자에게 교훈을 더하라 그가 더욱 지혜로와질 것이요 의로운 사람을 가르치라 그의 학식이 더하리라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - A. 사랑으로 말함", "t": "6. 책망을 받아들임", "a": "마18:15", "v": "네 형제가 죄를 범하거든 가서 너와 그 사람과만 상대하여 권고하라 만일 들으면 네가 네 형제를 얻은 것이요"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "1. 다른 사람을 용서함", "a": "엡4:32", "v": "서로 인자하게 하며 불쌍히 여기며 서로 용서하기를 하나님이 그리스도 안에서 너희를 용서하심과 같이 하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "1. 다른 사람을 용서함", "a": "골3:13", "v": "누가 뉘게 혐의가 있거든 서로 용납하여 피차 용서하되 주께서 너희를 용서하신 것과 같이 너희도 그리하고"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "2. 오래 참음", "a": "엡4:2", "v": "모든 겸손과 온유로 하고 오래 참음으로 사랑 가운데서 서로 용납하고"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "2. 오래 참음", "a": "딤후2:24-25", "v": "마땅히 주의 종은 다투지 아니하고 모든 사람을 대하여 온유하며 가르치기를 잘하며 참으며 거역하는 자를 온유함으로 징계할지니 혹 하나님이 저희에게 회개함을 주사 진리를 알게 하실까 하며"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "3. 분노를 다스림", "a": "엡4:26", "v": "분을 내어도 죄를 짓지 말며 해가 지도록 분을 품지 말고"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "3. 분노를 다스림", "a": "골3:8", "v": "이제는 너희가 이 모든 것을 벗어 버리라 곧 분과 악의와 훼방과 너희 입의 부끄러운 말이라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "4. 악의를 버림", "a": "히12:15", "v": "너희는 돌아보아 하나님 은혜에 이르지 못하는 자가 있는가 두려워하고 또 쓴 뿌리가 나서 괴롭게 하고 많은 사람이 이로 말미암아 더러움을 입을까 두려워하고"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "4. 악의를 버림", "a": "엡4:31", "v": "너희는 모든 악독과 노함과 분냄과 떠드는 것과 훼방하는 것을 모든 악의와 함께 버리고"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "5. 억울한 일을 참음", "a": "벧전2:20-21", "v": "죄가 있어 매를 맞고 참으면 무슨 칭찬이 있으리요 오직 선을 행함으로 고난을 받고 참으면 이는 하나님 앞에 아름다우니라 이를 위하여 너희가 부르심을 입었으니 그리스도도 너희를 위하여 고난을 받으사 너희에게 본을 끼쳐 그 자취를 따라오게 하려 하셨느니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "5. 억울한 일을 참음", "a": "롬12:19", "v": "내 사랑하는 자들아 너희가 친히 원수를 갚지 말고 진노하심에 맡기라 기록되었으되 원수 갚는 것이 내게 있으니 내가 갚으리라고 주께서 말씀하시니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "6. 시기심을 버림", "a": "잠27:4", "v": "분은 잔인하고 노는 창수같거니와 투기 앞에야 누가 서리요"}, {"c": "Ⅱ. 사랑 안에서 자라감 - B. 사랑으로 대함", "t": "6. 시기심을 버림", "a": "약3:16", "v": "시기와 다툼이 있는 곳에는 요란과 모든 악한 일이 있음이니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "1. 화목한 생활", "a": "롬15:5-6", "v": "이제 인내와 안위의 하나님이 너희로 그리스도 예수를 본받아 서로 뜻이 같게 하여 주사 한 마음과 한 입으로 하나님 곧 우리 주 예수 그리스도의 아버지께 영광을 돌리게 하려 하노라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "1. 화목한 생활", "a": "고전1:10", "v": "형제들아 내가 우리 주 예수 그리스도의 이름으로 너희를 권하노니 다 같은 말을 하고 너희 가운데 분쟁이 없이 같은 마음과 같은 뜻으로 온전히 합하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "2. 다른 사람을 섬김", "a": "마20:26-27", "v": "너희 중에는 그렇지 아니하니 너희 중에 누구든지 크고자 하는 자는 너희를 섬기는 자가 되고 너희 중에 누구든지 으뜸이 되고자 하는 자는 너희 종이 되어야 하리라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "2. 다른 사람을 섬김", "a": "갈5:13", "v": "형제들아 너희가 자유를 위하여 부르심을 입었으나 그러나 그 자유로 육체의 기회를 삼지 말고 오직 사랑으로 서로 종노릇하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "3. 남을 먼저 생각함", "a": "롬15:2", "v": "우리 각 사람이 이웃을 기쁘게 하되 선을 이루고 덕을 세우도록 할지니라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "3. 남을 먼저 생각함", "a": "빌2:3-4", "v": "아무 일에든지 다툼이나 허영으로 하지 말고 오직 겸손한 마음으로 각각 자기보다 남을 낫게 여기고 각각 자기 일을 돌아볼 뿐더러 또한 각각 다른 사람들의 일을 돌아보아 나의 기쁨을 충만케 하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "4. 서로 격려함", "a": "살전5:11", "v": "그러므로 피차 권면하고 피차 덕을 세우기를 너희가 하는 것 같이 하라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "4. 서로 격려함", "a": "전4:9-10", "v": "두 사람이 한 사람보다 나음은 저희가 수고함으로 좋은 상을 얻을 것임이라 혹시 저희가 넘어지면 하나가 그 동무를 붙들어 일으키려니와 홀로 있어 넘어지고 붙들어 일으킬 자가 없는 자에게는 화가 있으리라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "5. 불쌍히 여김", "a": "마9:36", "v": "무리를 보시고 민망히 여기시니 이는 저희가 목자 없는 양과 같이 고생하며 유리함이라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "5. 불쌍히 여김", "a": "롬12:15", "v": "즐거워하는 자들로 함께 즐거워하고 우는 자들로 함께 울라"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "6. 온유하게 대함", "a": "약3:17", "v": "오직 위로부터 난 지혜는 첫째 성결하고 다음에 화평하고 관용하고 양순하며 긍휼과 선한 열매가 가득하고 편벽과 거짓이 없나니"}, {"c": "Ⅱ. 사랑 안에서 자라감 - C. 사랑으로 행함", "t": "6. 온유하게 대함", "a": "갈6:1", "v": "형제들아 사람이 만일 무슨 범죄한 일이 드러나거든 신령한 너희는 온유한 심령으로 그러한 자를 바로잡고 네 자신을 돌아보아 너도 시험을 받을까 두려워하라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "1. 약속의 중요성", "a": "벧후1:3-4", "v": "그의 신기한 능력으로 생명과 경건에 속한 모든 것을 우리에게 주셨으니 이는 자기의 영광과 덕으로써 우리를 부르신 자를 앎으로 말미암음이라 이로써 그 보배롭고 지극히 큰 약속을 우리에게 주사 이 약속으로 말미암아 너희로 정욕을 인하여 세상에서 썩어질 것을 피하여 신의 성품에 참예하는 자가 되게 하려 하셨으니"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "1. 약속의 중요성", "a": "고후1:20", "v": "하나님의 약속은 얼마든지 그리스도 안에서 예가 되니 그런즉 그로 말미암아 우리가 아멘 하여 하나님께 영광을 돌리게 되느니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "2. 선교를 위한 약속들", "a": "고후1:3-4", "v": "찬송하리로다 그는 우리 주 예수 그리스도의 하나님이시요 자비의 아버지시요 모든 위로의 하나님이시며 우리의 모든 환난 중에서 우리를 위로하사 우리로 하여금 하나님께 받는 위로로써 모든 환난 중에 있는 자들을 능히 위로하게 하시는 이시로다"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "2. 선교를 위한 약속들", "a": "고전3:7-8", "v": "그런즉 심는 이나 물주는 이는 아무 것도 아니로되 오직 자라나게 하시는 하나님 뿐이니라 심는 이와 물주는 이가 일반이나 각각 자기의 일하는 대로 자기의 상을 받으리라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "3. 열매맺는 삶을 위한 약속들", "a": "시1:2-3", "v": "오직 여호와의 율법을 즐거워하여 그 율법을 주야로 묵상하는 자로다 저는 시냇가에 심은 나무가 시절을 좇아 과실을 맺으며 그 잎사귀가 마르지 아니함 같으니 그 행사가 다 형통하리로다"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "3. 열매맺는 삶을 위한 약속들", "a": "벧후1:8", "v": "이런 것이 너희에게 있어 흡족한즉 너희로 우리 주 예수 그리스도를 알기에 게으르지 않고 열매 없는 자가 되지 않게 하려니와"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "4. 고난 중 도우심을 위한 약속들", "a": "벧전5:10", "v": "모든 은혜의 하나님 곧 그리스도 안에서 너희를 부르사 자기의 영원한 영광에 들어가게 하신 이가 잠간 고난을 받은 너희를 친히 온전케 하시며 굳게 하시며 강하게 하시며 터를 견고케 하시리라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "4. 고난 중 도우심을 위한 약속들", "a": "고후12:9", "v": "내게 이르시기를 내 은혜가 네게 족하도다 이는 내 능력이 약한데서 온전하여짐이라 하신지라 이러므로 도리어 크게 기뻐함으로 나의 여러 약한 것들에 대하여 자랑하리니 이는 그리스도의 능력으로 내게 머물게 하려 함이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "5. 공급을 위한 약속들", "a": "엡1:3", "v": "찬송하리로다 하나님 곧 우리 주 예수 그리스도의 아버지께서 그리스도 안에서 하늘에 속한 모든 신령한 복으로 우리에게 복 주시되"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "5. 공급을 위한 약속들", "a": "시37:4-5", "v": "또 여호와를 기뻐하라 저가 네 마음의 소원을 이루어 주시리로다 너의 길을 여호와께 맡기라 저를 의지하면 저가 이루시고"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "6. 용서에 대한 약속들", "a": "요일2:1-2", "v": "나의 자녀들아 내가 이것을 너희에게 씀은 너희로 죄를 범치 않게 하려 함이라 만일 누가 죄를 범하면 아버지 앞에서 우리에게 대언자가 있으니 곧 의로우신 예수 그리스도시라 저는 우리 죄를 위한 화목 제물이니 우리만 위할뿐 아니요 온 세상의 죄를 위하심이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - A. 약속", "t": "6. 용서에 대한 약속들", "a": "시103:12", "v": "동이 서에서 먼 것 같이 우리 죄과를 우리에게서 멀리 옮기셨으며"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "1. 능력", "a": "히4:12", "v": "하나님의 말씀은 살았고 운동력이 있어 좌우에 날선 어떤 검보다도 예리하여 혼과 영과 및 관절과 골수를 찔러 쪼개기까지 하며 또 마음의 생각과 뜻을 감찰하나니"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "1. 능력", "a": "사55:10-11", "v": "비와 눈이 하늘에서 내려서는 다시 그리로 가지 않고 토지를 적시어서 싹이 나게 하며 열매가 맺게 하여 파종하는 자에게 종자를 주며 먹는 자에게 양식을 줌과 같이 내 입에서 나가는 말도 헛되이 내게로 돌아오지 아니하고 나의 뜻을 이루며 나의 명하여 보낸 일에 형통하리라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "2. 영감", "a": "벧후1:20-21", "v": "먼저 알 것은 경의 모든 예언은 사사로이 풀 것이 아니니 예언은 언제든지 사람의 뜻으로 낸 것이 아니요 오직 성령의 감동하심을 입은 사람들이 하나님께 받아 말한 것임이니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "2. 영감", "a": "살전2:13", "v": "이러므로 우리가 하나님께 쉬지 않고 감사함은 너희가 우리에게 들은바 하나님의 말씀을 받을 때에 사람의 말로 아니하고 하나님의 말씀으로 받음이니 진실로 그러하다 이 말씀이 또한 너희 믿는 자 속에서 역사하느니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "3. 영양", "a": "렘15:16", "v": "만군의 하나님 여호와시여 나는 주의 이름으로 일컬음을 받는 자라 내가 주의 말씀을 얻어 먹었사오니 주의 말씀은 내게 기쁨과 내 마음의 즐거움이오나"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "3. 영양", "a": "욥23:12", "v": "내가 그의 입술의 명령을 어기지 아니하고 일정한 음식보다 그 입의 말씀을 귀히 여겼구나"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "4. 알아야 함", "a": "행17:11", "v": "베뢰아 사람은 데살로니가에 있는 사람보다 더 신사적이어서 간절한 마음으로 말씀을 받고 이것이 그러한가 하여 날마다 성경을 상고하므로"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "4. 알아야 함", "a": "요5:39-40", "v": "너희가 성경에서 영생을 얻는 줄 생각하고 성경을 상고하거니와 이 성경이 곧 내게 대하여 증거하는 것이로다 그러나 너희가 영생을 얻기 위하여 내게 오기를 원하지 아니하는도다"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "5. 순종해야 함", "a": "요8:31-32", "v": "그러므로 예수께서 자기를 믿은 유대인들에게 이르시되 너희가 내 말에 거하면 참 내 제자가 되고 진리를 알지니 진리가 너희를 자유케 하리라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "5. 순종해야 함", "a": "마4:4", "v": "예수께서 대답하여 가라사대 기록되었으되 사람이 떡으로만 살 것이 아니요 하나님의 입으로 나오는 모든 말씀으로 살 것이라 하였느니라 하시니"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "6. 확실성", "a": "마24:35", "v": "천지는 없어지겠으나 내 말은 없어지지 아니하리라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - B. 말씀", "t": "6. 확실성", "a": "요17:17", "v": "저희를 진리로 거룩하게 하옵소서 아버지의 말씀은 진리니이다"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "1. 믿음의 시련", "a": "벧전1:6-7", "v": "그러므로 너희가 이제 여러 가지 시험을 인하여 잠간 근심하게 되지 않을 수 없었으나 오히려 크게 기뻐하도다 너희 믿음의 시련이 불로 연단하여도 없어질 금보다 더 귀하여 예수 그리스도의 나타나실 때에 칭찬과 영광과 존귀를 얻게 하려 함이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "1. 믿음의 시련", "a": "약1:2-4", "v": "내 형제들아 너희가 여러 가지 시험을 만나거든 온전히 기쁘게 여기라 이는 너희 믿음의 시련이 인내를 만들어 내는 줄 너희가 앎이라 인내를 온전히 이루라 이는 너희로 온전하고 구비하여 조금도 부족함이 없게 하려 함이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "2. 불신의 결과", "a": "히4:2", "v": "저희와 같이 우리도 복음 전함을 받은 자이나 그러나 그 들은 바 말씀이 저희에게 유익되지 못한 것은 듣는 자가 믿음을 화합지 아니함이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "2. 불신의 결과", "a": "히10:38", "v": "오직 나의 의인은 믿음으로 말미암아 살리라 또한 뒤로 물러가면 내 마음이 저를 기뻐하지 아니하리라 하셨느니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "3. 믿음의 투쟁", "a": "엡6:16", "v": "모든 것 위에 믿음의 방패를 가지고 이로써 능히 악한 자의 모든 화전을 소멸하고"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "3. 믿음의 투쟁", "a": "딤전6:11-12", "v": "오직 너 하나님의 사람아 이것들을 피하고 의와 경건과 믿음과 사랑과 인내와 온유를 좇으며 믿음의 선한 싸움을 싸우라 영생을 취하라 이를 위하여 네가 부르심을 입었고 많은 증인 앞에서 선한 증거를 증거하였도다"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "4. 믿음의 근원", "a": "히11:1", "v": "믿음은 바라는 것들의 실상이요 보지 못하는 것들의 증거니"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "4. 믿음의 근원", "a": "롬10:17", "v": "그러므로 믿음은 들음에서 나며 들음은 그리스도의 말씀으로 말미암았느니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "5. 행하는 믿음", "a": "히6:12", "v": "게으르지 아니하고 믿음과 오래 참음으로 말미암아 약속들을 기업으로 받는 자들을 본받는 자 되게 하려는 것이니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "5. 행하는 믿음", "a": "약2:17", "v": "이와 같이 행함이 없는 믿음은 그 자체가 죽은 것이라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "6. 믿음으로 의롭게 됨", "a": "갈2:16", "v": "사람이 의롭게 되는 것은 율법의 행위에서 난 것이 아니요 오직 예수 그리스도를 믿음으로 말미암는 줄 아는 고로 우리도 그리스도 예수를 믿나니 이는 우리가 율법의 행위에서 아니고 그리스도를 믿음으로서 의롭다 함을 얻으려 함이라 율법의 행위로서는 의롭다 함을 얻을 육체가 없느니라"}, {"c": "Ⅲ. 믿음 안에서 자라감 - C. 믿음", "t": "6. 믿음으로 의롭게 됨", "a": "롬5:1", "v": "그러므로 우리가 믿음으로 의롭다 하심을 얻었은즉 우리 주 예수 그리스도로 말미암아 하나님으로 더불어 화평을 누리자"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "1. 그리스도안에 있는 승리", "a": "고전15:57", "v": "우리 주 예수 그리스도로 말미암아 우리에게 이김을 주시는 하나님께 감사하노니"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "1. 그리스도안에 있는 승리", "a": "고후2:14", "v": "항상 우리를 그리스도 안에서 이기게 하시고 우리로 말미암아 각처에서 그리스도를 아는 냄새를 나타내시는 하나님께 감사하노라"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "2. 승리의 무기", "a": "고후10:4-5", "v": "우리의 싸우는 병기는 육체에 속한 것이 아니요 오직 하나님 앞에서 견고한 진을 파하는 강력이라 모든 이론을 파하며 하나님 아는 것을 대적하여 높아진 것을 다 파하고 모든 생각을 사로잡아 그리스도에게 복종케 하니"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "2. 승리의 무기", "a": "엡6:10-11", "v": "종말로 너희가 주 안에서와 그 힘의 능력으로 강건하여지고 마귀의 궤계를 능히 대적하기 위하여 하나님의 전신갑주를 입으라"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "3. 마귀를 이김", "a": "계12:11", "v": "또 여러 형제가 어린 양의 피와 자기의 증거하는 말을 인하여 저를 이기었으니 그들은 죽기까지 자기 생명을 아끼지 아니하였도다"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "3. 마귀를 이김", "a": "약4:7-8", "v": "그런즉 너희는 하나님께 순복할지어다 마귀를 대적하라 그리하면 너희를 피하리라 하나님을 가까이 하라 그리하면 너희를 가까이 하시리라 죄인들아 손을 깨끗이 하라 두 마음을 품은 자들아 마음을 성결케 하라"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "4. 육신을 이김", "a": "롬13:14", "v": "오직 주 예수 그리스도로 옷입고 정욕을 위하여 육신의 일을 도모하지 말라"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "5. 세상을 이김", "a": "요일4:4", "v": "자녀들아 너희는 하나님께 속하였고 또 저희를 이기었나니 이는 너희 안에 계신 이가 세상에 있는 이보다 크심이라"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "5. 세상을 이김", "a": "요일5:4-5", "v": "대저 하나님께로서 난 자마다 세상을 이기느니라 세상을 이긴 이김은 이것이니 우리의 믿음이니라 예수께서 하나님의 아들이심을 믿는 자가 아니면 세상을 이기는 자가 누구뇨"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "6. 죄를 이김", "a": "시37:31", "v": "그 마음에는 하나님의 법이 있으니 그 걸음에 실족함이 없으리로다"}, {"c": "Ⅳ. 승리 안에서 행함 - A. 승리", "t": "6. 죄를 이김", "a": "롬6:12-13", "v": "그러므로 너희는 죄로 너희 죽을 몸에 왕노릇 하지 못하게 하여 몸의 사욕을 순종치 말고 또한 너희 지체를 불의의 병기로 죄에게 드리지 말고 오직 너희 자신을 죽은 자 가운데서 다시 산 자 같이 하나님께 드리며 너희 지체를 의의 병기로 하나님께 드리라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "1. 생각", "a": "빌4:8", "v": "종말로 형제들아 무엇에든지 참되며 무엇에든지 경건하며 무엇에든지 옳으며 무엇에든지 정결하며 무엇에든지 사랑할만하며 무엇에든지 칭찬할만하며 무슨 덕이 있든지 무슨 기림이 있든지 이것들을 생각하라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "1. 생각", "a": "딛1:15", "v": "깨끗한 자들에게는 모든 것이 깨끗하나 더럽고 믿지 아니하는 자들에게는 아무 것도 깨끗한 것이 없고 오직 저희 마음과 양심이 더러운지라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "2. 마음", "a": "눅6:45", "v": "선한 사람은 마음의 쌓은 선에서 선을 내고 악한 자는 그 쌓은 악에서 악을 내나니 이는 마음의 가득한 것을 입으로 말함이니라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "2. 마음", "a": "잠4:23", "v": "무릇 지킬만한 것보다 더욱 네 마음을 지키라 생명의 근원이 이에서 남이니라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "3. 눈", "a": "마6:22", "v": "눈은 몸의 등불이니 그러므로 네 눈이 성하면 온 몸이 밝을 것이요"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "3. 눈", "a": "마5:28", "v": "나는 너희에게 이르노니 여자를 보고 음욕을 품는 자마다 마음에 이미 간음하였느니라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "4. 몸", "a": "살전4:3", "v": "하나님의 뜻은 이것이니 너희의 거룩함이라 곧 음란을 버리고"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "4. 몸", "a": "고전6:13", "v": "식물은 배를 위하고 배는 식물을 위하나 하나님이 이것 저것 다 폐하시리라 몸은 음란을 위하지 않고 오직 주를 위하며 주는 몸을 위하시느니라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "5. 말", "a": "엡4:29", "v": "무릇 더러운 말은 너희 입밖에도 내지 말고 오직 덕을 세우는데 소용되는 대로 선한 말을 하여 듣는 자들에게 은혜를 끼치게 하라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "5. 말", "a": "마12:36-37", "v": "내가 너희에게 이르노니 사람이 무슨 무익한 말을 하든지 심판 날에 이에 대하여 심문을 받으리니 네 말로 의롭다 함을 받고 네 말로 정죄함을 받으리라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "6. 행동", "a": "살전5:22", "v": "악은 모든 모양이라도 버리라"}, {"c": "Ⅳ. 승리 안에서 행함 - B. 순결", "t": "6. 행동", "a": "딤전5:1-2", "v": "늙은이를 꾸짖지 말고 권하되 아비에게 하듯하며 젊은이를 형제에게 하듯하고 늙은 여자를 어미에게 하듯하며 젊은 여자를 일절 깨끗함으로 자매에게 하듯하라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "1. 구하고 행하라", "a": "마21:22", "v": "너희가 기도할 때에 무엇이든지 믿고 구하는 것은 다 받으리라 하시니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "1. 구하고 행하라", "a": "마7:7-8", "v": "구하라 그러면 너희에게 주실 것이요 찾으라 그러면 찾을 것이요 문을 두드리라 그러면 너희에게 열릴 것이니 구하는 이마다 얻을 것이요 찾는 이가 찾을 것이요 두드리는 이에게 열릴 것이니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "2. 은밀한 기도", "a": "마6:6", "v": "너는 기도할 때에 네 골방에 들어가 문을 닫고 은밀한 중에 계신 네 아버지께 기도하라 은밀한 중에 보시는 네 아버지께서 갚으시리라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "2. 은밀한 기도", "a": "막1:35", "v": "새벽 오히려 미명에 예수께서 일어나 나가 한적한 곳으로 가사 거기서 기도하시더니"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "3. 하나님의 응답", "a": "렘33:3", "v": "너는 내게 부르짖으라 내가 네게 응답하겠고 네가 알지 못하는 크고 비밀한 일을 네게 보이리라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "3. 하나님의 응답", "a": "엡3:20", "v": "우리 가운데서 역사하시는 능력대로 우리의 온갖 구하는 것이나 생각하는 것에 더 넘치도록 능히 하실 이에게"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "4. 그의 뜻대로 기도함", "a": "요일5:14-15", "v": "그를 향하여 우리의 가진바 담대한 것이 이것이니 그의 뜻대로 무엇을 구하면 들으심이라 우리가 무엇이든지 구하는 바를 들으시는 줄을 안즉 우리가 그에게 구한 그것을 얻은 줄을 또한 아느니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "4. 그의 뜻대로 기도함", "a": "살전5:17-18", "v": "쉬지 말고 기도하라 범사에 감사하라 이는 그리스도 예수 안에서 너희를 향하신 하나님의 뜻이니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "5. 중보의 기도", "a": "삼상12:23", "v": "나는 너희를 위하여 기도하기를 쉬는 죄를 여호와 앞에 결단코 범치 아니하고 선하고 의로운 도로 너희를 가르칠 것인즉"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "5. 중보의 기도", "a": "마9:37-38", "v": "이에 제자들에게 이르시되 추수할 것은 많되 일군은 적으니 그러므로 추수하는 주인에게 청하여 추수할 일군들을 보내어 주소서 하라 하시니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "6. 찬양", "a": "히13:15", "v": "이러므로 우리가 예수로 말미암아 항상 찬미의 제사를 하나님께 드리자 이는 그 이름을 증거하는 입술의 열매니라"}, {"c": "Ⅳ. 승리 안에서 행함 - C. 기도", "t": "6. 찬양", "a": "시146:1-2", "v": "할렐루야 내 영혼아 여호와를 찬양하라 나의 생전에 여호와를 찬양하며 나의 평생에 내 하나님을 찬송하리로다"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "1. 모든 사람에게 전파함", "a": "골1:27-28", "v": "하나님이 그들로 하여금 이 비밀의 영광이 이방인 가운데 어떻게 풍성한 것을 알게 하려 하심이라 이 비밀은 너희 안에 계신 그리스도시니 곧 영광의 소망이니라 우리가 그를 전파하여 각 사람을 권하고 모든 지혜로 각 사람을 가르침은 각 사람을 그리스도 안에서 완전한 자로 세우려 함이니"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "2. 하나님의 사신이 됨", "a": "고후5:19-20", "v": "이는 하나님께서 그리스도 안에 계시사 세상을 자기와 화목하게 하시며 저희의 죄를 저희에게 돌리지 아니하시고 화목하게 하는 말씀을 우리에게 부탁하셨느니라 이러므로 우리가 그리스도를 대신하여 사신이 되어 하나님이 우리로 너희를 권면하시는 것 같이 그리스도를 대신하여 간구하노니 너희는 하나님과 화목하라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "3. 하나님을 기쁘시게 함", "a": "살전2:4", "v": "오직 하나님의 옳게 여기심을 입어 복음 전할 부탁을 받았으니 우리가 이와 같이 말함은 사람을 기쁘게 하려 함이 아니요 오직 우리 마음을 감찰하시는 하나님을 기쁘시게 하려 함이라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "4. 모든 사람을 섬김", "a": "고전9:19", "v": "내가 모든 사람에게 자유하였으나 스스로 모든 사람에게 종이 된 것은 더 많은 사람을 얻고자 함이라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "5. 시기를 분별함", "a": "요4:35", "v": "너희가 넉 달이 지나야 추수할 때가 이르겠다 하지 아니하느냐 내가 너희에게 이르노니 눈을 들어 밭을 보라 희어져 추수하게 되었도다"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "6. 생명을 나눔", "a": "살전2:8", "v": "우리가 이같이 너희를 사모하여 하나님의 복음으로만 아니라 우리 목숨까지 너희에게 주기를 즐겨함은 너희가 우리의 사랑하는 자 됨이니라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "7. 죄의 실재", "a": "롬3:10-12", "v": "기록한바 의인은 없나니 하나도 없으며 깨닫는 자도 없고 하나님을 찾는 자도 없고 다 치우쳐 한가지로 무익하게 되고 선을 행하는 자는 없나니 하나도 없도다"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "8. 죄의 결말", "a": "살후1:8-9", "v": "하나님을 모르는 자들과 우리 주 예수의 복음을 복종치 않는 자들에게 형벌을 주시리니 이런 자들이 주의 얼굴과 그의 힘의 영광을 떠나 영원한 멸망의 형벌을 받으리로다"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "9. 그리스도께서 값을 치루심", "a": "벧전2:24", "v": "친히 나무에 달려 그 몸으로 우리 죄를 담당하셨으니 이는 우리로 죄에 대하여 죽고 의에 대하여 살게 하려 하심이라 저가 채찍에 맞음으로 너희는 나음을 얻었나니"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "10. 선물로 주신 구원", "a": "딤후1:9", "v": "하나님이 우리를 구원하사 거룩하신 부르심으로 부르심은 우리의 행위대로 하심이 아니요 오직 자기 뜻과 영원한 때 전부터 그리스도 예수 안에서 우리에게 주신 은혜대로 하심이라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "11. 믿고 영접함", "a": "롬10:9-10", "v": "네가 만일 네 입으로 예수를 주로 시인하며 또 하나님께서 그를 죽은 자 가운데서 살리신 것을 네 마음에 믿으면 구원을 얻으리니 사람이 마음으로 믿어 의에 이르고 입으로 시인하여 구원에 이르느니라"}, {"c": "Ⅴ. 그리스도를 증거함 - A. 전도", "t": "12. 구원의 확신", "a": "요10:28-29", "v": "내가 저희에게 영생을 주노니 영원히 멸망치 아니할 터이요 또 저희를 내 손에서 빼앗을 자가 없느니라 저희를 주신 내 아버지는 만유보다 크시매 아무도 아버지 손에서 빼앗을 수 없느니라"}, {"c": "Ⅴ. 그리스도를 증거함 - B. 변명", "t": "1. 나는 그렇게 나쁜 사람이 아니다", "a": "잠21:2", "v": "사람의 행위가 자기 보기에는 모두 정직하여도 여호와는 심령을 감찰하시느니라"}, {"c": "Ⅴ. 그리스도를 증거함 - B. 변명", "t": "2. 포기할 게 너무 많다", "a": "막8:36", "v": "사람이 만일 온 천하를 얻고도 제 목숨을 잃으면 무엇이 유익하리요"}, {"c": "Ⅴ. 그리스도를 증거함 - B. 변명", "t": "3. 이해할 수 없다", "a": "요7:17", "v": "사람이 하나님의 뜻을 행하려 하면 이 교훈이 하나님께로서 왔는지 내가 스스로 말함인지 알리라"}, {"c": "Ⅴ. 그리스도를 증거함 - B. 변명", "t": "4. 나는 아직 그렇게 선하지는 못하다", "a": "눅5:31-32", "v": "예수께서 대답하여 가라사대 건강한 자에게는 의원이 쓸데 없고 병든 자에게라야 쓸데 있나니 내 let displayData = [];
let page        = 0;  // 0-based page index (3 cards each)
let isShuffled  = false;
let isMemMode   = false;
let activeCat   = 'all';
let doneSet     = new Set();
let retryQueue  = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCatNum(item) {
  const map = {'Ⅰ':'1','Ⅱ':'2','Ⅲ':'3','Ⅳ':'4','Ⅴ':'5'};
  return map[item.c.charAt(0)] || 'all';
}

function buildDisplayData() {
  const baseData = data.filter(d => d.a !== '');
  let pool;
  if (activeCat === 'all') pool = baseData.slice();
  else pool = baseData.filter(d => getCatNum(d) === activeCat);
  displayData = isShuffled ? shuffle(pool) : pool;
}

function totalPages() {
  return Math.max(1, Math.ceil(displayData.length / CARDS_PER_PAGE));
}

function getPageItems() {
  const start = page * CARDS_PER_PAGE;
  return displayData.slice(start, start + CARDS_PER_PAGE);
}

function saveState() {
  try {
    localStorage.setItem(LS_POS,  page.toString());
    localStorage.setItem(LS_DONE, JSON.stringify([...doneSet]));
    localStorage.setItem(LS_RETRY,JSON.stringify(retryQueue));
    localStorage.setItem(LS_CAT,  activeCat);
    localStorage.setItem(LS_SHUF, isShuffled ? '1' : '0');
    localStorage.setItem(LS_MEM,  isMemMode  ? '1' : '0');
  } catch(e) {}
}

function loadState() {
  try {
    const sd = localStorage.getItem(LS_DONE);
    const sr = localStorage.getItem(LS_RETRY);
    const sc = localStorage.getItem(LS_CAT);
    const ss = localStorage.getItem(LS_SHUF);
    const sm = localStorage.getItem(LS_MEM);
    if (sd) doneSet    = new Set(JSON.parse(sd));
    if (sr) retryQueue = JSON.parse(sr);
    if (sc) activeCat  = sc;
    if (ss) isShuffled = ss === '1';
    if (sm) isMemMode  = sm === '1';
  } catch(e) {}
}

function selectCat(cat) {
  activeCat = cat;
  page = 0;
  buildDisplayData();
  updateChips();
  render();
  saveState();
}

function updateChips() {
  document.querySelectorAll('.cat-chip').forEach(el => {
    el.className = 'cat-chip';
    if (el.dataset.cat === activeCat) {
      el.classList.add('active-' + (activeCat === 'all' ? 'all' : activeCat));
    }
  });
  const allChip = document.querySelector('[data-cat="all"]');
  const base = data.filter(d => d.a !== '');
  allChip.textContent = '전체 (' + base.length + ')';
  ['1','2','3','4','5'].forEach(n => {
    const cnt = base.filter(d => getCatNum(d) === n).length;
    const chip = document.querySelector('[data-cat="' + n + '"]');
    if (chip) {
      const names = {'1':'Ⅰ 하나님','2':'Ⅱ 사랑','3':'Ⅲ 믿음','4':'Ⅳ 승리','5':'Ⅴ 전도'};
      chip.textContent = names[n] + ' (' + cnt + ')';
    }
  });
}

function toggleShuffle() {
  isShuffled = !isShuffled;
  page = 0;
  buildDisplayData();
  const btn = document.getElementById('btnShuffle');
  if (isShuffled) {
    btn.classList.add('active');
    btn.textContent = '🔀 섞기';
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔀';
  }
  render();
  saveState();
}

function toggleMemMode() {
  isMemMode = !isMemMode;
  const btn = document.getElementById('btnMem');
  if (isMemMode) {
    btn.classList.add('active');
    btn.textContent = '✍ 암송중';
  } else {
    btn.classList.remove('active');
    btn.textContent = '✍ 암송';
  }
  // reset all reveals
  document.querySelectorAll('.mem-card').forEach(c => c.classList.remove('revealed'));
  applyMemMode();
  saveState();
}

function applyMemMode() {
  document.querySelectorAll('.mem-card').forEach(c => {
    if (isMemMode) c.classList.add('hide-verse');
    else           c.classList.remove('hide-verse','revealed');
  });
}

function toggleCard(el) {
  if (!isMemMode) return;
  el.classList.toggle('revealed');
}

function move(step) {
  page += step;
  if (page < 0) page = 0;
  if (page >= totalPages()) page = totalPages() - 1;
  render();
  saveState();
}

function render() {
  const wrap = document.getElementById('cardWrap');
  const items = getPageItems();
  const tp = totalPages();

  if (displayData.length === 0) {
    wrap.innerHTML = '<div class="empty-msg">해당 카드가 없습니다.</div>';
    document.getElementById('progText').textContent = '0 / 0';
    document.getElementById('progFill').style.width = '0%';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }

  const start = page * CARDS_PER_PAGE + 1;
  const end   = Math.min((page + 1) * CARDS_PER_PAGE, displayData.length);
  document.getElementById('progText').textContent = start + '–' + end + ' / ' + displayData.length;
  document.getElementById('progFill').style.width = ((page + 1) / tp * 100).toFixed(1) + '%';
  document.getElementById('btnPrev').disabled = (page === 0);
  document.getElementById('btnNext').disabled = (page >= tp - 1);

  wrap.innerHTML = '';
  items.forEach((item, i) => {
    const catNum = getCatNum(item);
    const card = document.createElement('div');
    card.className = 'mem-card' + (isMemMode ? ' hide-verse' : '');
    card.setAttribute('onclick', 'toggleCard(this)');
    card.style.animationDelay = (i * 0.06) + 's';

    card.innerHTML =
      '<div class="card-banner ' + (CAT_BG[catNum] || '') + '">' +
        '<div class="banner-roman">' + (CAT_MAP[catNum] || '') + '</div>' +
        '<div class="banner-cat">' + item.c + '</div>' +
        '<div class="banner-topic">' + item.t + '</div>' +
        '<span class="banner-addr">' + item.a + '</span>' +
      '</div>' +
      '<div class="card-hint">👆 탭하면 말씀이 나타납니다</div>' +
      '<div class="card-verse">' + item.v + '</div>';

    wrap.appendChild(card);
  });

  wrap.scrollTop = 0;
}

function init() {
  loadState();
  buildDisplayData();
  updateChips();

  if (isShuffled) {
    const btn = document.getElementById('btnShuffle');
    btn.classList.add('active');
    btn.textContent = '🔀 섞기';
  }
  if (isMemMode) {
    const btn = document.getElementById('btnMem');
    btn.classList.add('active');
    btn.textContent = '✍ 암송중';
  }

  try {
    const sp = localStorage.getItem(LS_POS);
    if (sp !== null) {
      const p = parseInt(sp);
      if (!isNaN(p) && p < totalPages()) page = p;
    }
  } catch(e) {}

  render();
}

window.onload = init;

function goHomeSafe() {
  if (window.parent && window.parent !== window) window.parent.postMessage("GO_HOME","*");
  else window.location.href = "대문.html";
}

</script>
</body>
</html>
