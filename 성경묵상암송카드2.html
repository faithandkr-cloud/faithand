<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>암송카드 — 은혜가풍성한교회</title>
<style>
/* ══════════════════════════════════════
   토큰 & 리셋
══════════════════════════════════════ */
:root {
  --bg:       #0f1923;
  --surface:  #1e2f42;
  --surface2: #223044;
  --border:   rgba(180,150,80,.35);
  --gold:     #c9a84c;
  --gold-dim: rgba(201,168,76,.55);
  --gold-bg:  rgba(201,168,76,.08);
  --cream:    #ede8d8;
  --muted:    #8a9ab0;
  --ot:       #c9a84c;   /* 구약 */
  --nt:       #5b9fd4;   /* 신약 */
  --green:    #4caf7d;
  --radius:   14px;
  --header-h: 56px;
  --ctrl-h:   52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════
   헤더 (고정)
══════════════════════════════════════ */
header {
  height: var(--header-h);
  min-height: var(--header-h);
  background: var(--surface);
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
}
.logo-icon { font-size: 1.4rem; color: var(--gold); flex-shrink: 0; }
.logo-text { flex: 1; }
.logo-text b { display: block; font-size: .95rem; font-weight: 700; color: var(--gold); letter-spacing: .3px; }
.logo-text small { font-size: .68rem; color: var(--muted); }
.home-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px;
  background: var(--gold-bg);
  border: 1px solid var(--gold-dim);
  border-radius: 20px;
  color: var(--gold);
  font-size: .78rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background .15s;
  flex-shrink: 0;
}
.home-btn:hover { background: rgba(201,168,76,.18); }

/* ══════════════════════════════════════
   컨트롤바 (고정)
══════════════════════════════════════ */
.ctrl {
  height: var(--ctrl-h);
  min-height: var(--ctrl-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  flex-shrink: 0;
}
/* 섹션 드롭다운 */
.grp-sel {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  color: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: .8rem;
  cursor: pointer;
  outline: none;
  height: 34px;
}
.grp-sel:focus { border-color: var(--gold-dim); }
.grp-sel optgroup { background: var(--surface); color: var(--gold); font-weight: 700; }
.grp-sel option   { background: var(--bg); color: var(--cream); }

/* 묵상/암송 토글 */
.mode-wrap {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  height: 34px;
}
.mode-btn {
  padding: 0 12px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: .78rem;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  height: 100%;
}
.mode-btn.on {
  background: var(--gold);
  color: #1a1400;
  font-weight: 700;
}

/* 이전/다음 + 카운터 */
.nav-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.nav-btn {
  background: transparent;
  border: none;
  color: var(--gold);
  font-size: .82rem;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  transition: background .1s;
  white-space: nowrap;
}
.nav-btn:hover { background: var(--gold-bg); }
.nav-btn:disabled { color: var(--muted); opacity: .4; cursor: default; }
.nav-btn:disabled:hover { background: transparent; }
.ctr {
  font-size: .75rem;
  color: var(--muted);
  min-width: 42px;
  text-align: center;
}

/* ══════════════════════════════════════
   카드 스크롤 영역
══════════════════════════════════════ */
.card-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 32px;
}
.card-wrap::-webkit-scrollbar { width: 4px; }
.card-wrap::-webkit-scrollbar-track { background: transparent; }
.card-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 섹션 뱃지 */
.sec-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: .7rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding: 0 2px;
}
.sec-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* 구절 카드 */
.verse-card {
  background: #1e3148;
  border: 1px solid rgba(180,150,80,.45);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.verse-card:hover { border-color: var(--gold-dim); background: var(--surface2); }

/* 카드 왼쪽 색상 바 */
.verse-card.ot { border-left: 3px solid var(--ot); }
.verse-card.nt { border-left: 3px solid var(--nt); }

/* 주소줄 */
.v-ref {
  padding: 9px 14px 5px;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .3px;
}
.verse-card.ot .v-ref { color: var(--ot); }
.verse-card.nt .v-ref { color: var(--nt); }

/* 본문 */
.v-txt {
  padding: 0 14px 12px;
  font-size: .95rem;
  line-height: 1.75;
  color: var(--cream);
  transition: filter .25s, opacity .25s;
  word-break: keep-all;
}

/* ══════ 암송 모드 ══════ */
.mem-mode .v-txt {
  filter: blur(6px);
  opacity: .3;
  user-select: none;
}
.mem-mode .verse-card.rev .v-txt {
  filter: none;
  opacity: 1;
}
.mem-hint {
  display: none;
  font-size: .68rem;
  color: var(--gold-dim);
  padding: 0 14px 8px;
}
.mem-mode .mem-hint { display: block; }
.mem-mode .verse-card.rev .mem-hint { display: none; }

/* ══════ 하단 버튼 영역 ══════ */
.card-footer {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 6px;
  padding: 0 2px;
}
.ft-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: .78rem;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.ft-btn:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-bg); }
.ft-btn.reveal { display: none; }
.mem-mode .ft-btn.reveal { display: inline-flex; }
.ft-btn.done-btn { border-color: transparent; }
.ft-btn.done-btn.lit {
  background: linear-gradient(135deg,#f5c518,#ff9800);
  border-color: #f5c518;
  color: #1a1000;
  font-weight: 700;
  animation: glow .9s ease-in-out infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 0 6px rgba(245,197,24,.4); }
  to   { box-shadow: 0 0 18px rgba(245,197,24,.8), 0 0 32px rgba(255,152,0,.4); }
}

/* ══════ 빈 상태 ══════ */
.empty-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: .88rem;
  line-height: 2;
}

/* ══════ 편집 패널 ══════ */
.edit-wrap { padding: 0 14px; margin-top: 8px; }
.edit-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: .78rem;
  cursor: pointer;
  transition: all .15s;
}
.edit-toggle:hover { border-color: var(--gold-dim); color: var(--gold); }
.edit-body { display: none; margin-top: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.edit-body.open { display: block; }
.edit-note { padding: 10px 14px; background: rgba(0,0,0,.2); font-size: .75rem; color: var(--muted); line-height: 1.7; border-bottom: 1px solid var(--border); }
.edit-note code { color: var(--gold); font-family: monospace; background: rgba(0,0,0,.3); padding: 1px 5px; border-radius: 3px; }
textarea#vtArea { width: 100%; height: 280px; background: var(--bg); color: var(--cream); border: none; padding: 12px 14px; font-size: .8rem; line-height: 1.7; resize: vertical; outline: none; font-family: 'Malgun Gothic', monospace; }
.edit-acts { padding: 10px 14px; display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border); flex-wrap: wrap; }
.btn-ok  { padding: 7px 18px; background: var(--gold); color: #1a1400; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: .8rem; }
.btn-rst { padding: 7px 14px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: .8rem; }
#fetchStatus { font-size: .75rem; color: var(--gold); margin-left: 4px; }

/* ══════ 토스트 ══════ */
/* ══════ 성경 설정 모달 ══════ */
.bset-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:900;align-items:center;justify-content:center;}
.bset-overlay.open{display:flex;}
.bset-box{background:#1a2736;border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:22px 20px;width:min(90vw,360px);max-height:80vh;overflow-y:auto;}
.bset-box h3{color:var(--gold);font-size:.95rem;margin-bottom:14px;text-align:center;}
.bset-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.1);}
.bset-label{flex:1;font-size:.82rem;color:var(--cream);}
.bset-status{font-size:.72rem;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--muted);white-space:nowrap;}
.bset-status.ok{background:rgba(76,175,80,.15);color:#81c784;}
.bset-upload{padding:5px 10px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);border-radius:6px;color:var(--gold);font-size:.72rem;cursor:pointer;white-space:nowrap;}
.bset-upload:hover{background:rgba(201,168,76,.3);}
.bset-del{padding:5px 8px;background:transparent;border:1px solid rgba(255,80,80,.3);border-radius:6px;color:#ff8080;font-size:.72rem;cursor:pointer;}
.bset-del:hover{background:rgba(255,80,80,.15);}
.bset-close{width:100%;margin-top:16px;padding:10px;background:var(--gold);color:#1a1400;border:none;border-radius:10px;font-weight:700;font-size:.85rem;cursor:pointer;}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--gold); color: #1a1400;
  padding: 8px 22px; border-radius: 20px;
  font-weight: 700; font-size: .82rem;
  opacity: 0; transition: all .3s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════ 모바일 ══════ */
@media (max-width: 480px) {
  :root { --header-h: 50px; --ctrl-h: 48px; }
  .ctrl { gap: 6px; padding: 0 10px; }
  .mode-btn { padding: 0 8px; font-size: .74rem; }
  .grp-sel { font-size: .75rem; }
  .v-txt { font-size: .9rem; }
  .nav-btn { font-size: .78rem; padding: 4px 4px; }
}
@media print {
  header, .ctrl, .edit-wrap, .card-footer { display: none; }
  body { overflow: visible; }
  .card-wrap { overflow: visible; }
  .verse-card { border: 1px solid #ccc; box-shadow: none; margin-bottom: 8px; }
  .v-txt { filter: none !important; opacity: 1 !important; }
}
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="logo-icon">✟</div>
  <div class="logo-text">
    <b>암송카드</b>
    <small>은혜가풍성한교회</small>
  </div>
  <button class="home-btn" onclick="openBibleSetting()" style="margin-right:4px">⚙️</button>
  <button class="home-btn" onclick="goHomeSafe()">⬅ 홈</button>
</header>

<!-- ── 컨트롤바 ── -->
<div class="ctrl">
  <select class="grp-sel" id="grpSel" onchange="selGroup(+this.value)"></select>
  <div class="mode-wrap">
    <button class="mode-btn on" id="bMed" onclick="setMode('med')">📖 묵상</button>
    <button class="mode-btn"   id="bMem" onclick="setMode('mem')">✍ 암송</button>
  </div>
  <div class="nav-group">
    <button class="nav-btn" id="bPrev" onclick="nav(-1)">◀</button>
    <span class="ctr" id="ctr">0/0</span>
    <button class="nav-btn" id="bNext" onclick="nav(+1)">▶</button>
  </div>
</div>

<!-- ── 카드 스크롤 영역 ── -->
<div class="card-wrap" id="cardWrap">
  <!-- JS 렌더 -->
</div>

<!-- ── 토스트 ── -->
<div class="toast" id="toast"></div>

<!-- ── 성경 JSON 설정 모달 ── -->
<div class="bset-overlay" id="bsetOverlay" onclick="if(event.target===this)closeBibleSetting()">
  <div class="bset-box">
    <h3>⚙️ 성경 데이터 설정</h3>
    <p style="font-size:.75rem;color:var(--muted);margin-bottom:12px;line-height:1.6;">개역개정 JSON 파일을 등록하면<br>성경 주소만 입력해도 본문이 자동으로 채워집니다.</p>
    <div class="bset-row">
      <div class="bset-label">📗 개역개정</div>
      <span class="bset-status" id="bset-status">확인 중...</span>
      <label class="bset-upload">
        파일 선택
        <input type="file" accept=".json" style="display:none" onchange="uploadBibleJson(this)">
      </label>
      <button class="bset-del" onclick="deleteBibleJson()">삭제</button>
    </div>
    <button class="bset-close" onclick="closeBibleSetting()">닫기</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   기본 구절 데이터
══════════════════════════════════════ */
const DEFAULT_TEXT = `구약 — 하나님의 주권과 믿음의 결단
[창세기 1:1] 태초에 하나님이 천지를 창조하시니라
[창세기 22:1] 그 일 후에 하나님이 아브라함을 시험하시려고 그를 부르시되 아브라함아 하시니 그가 이르되 내가 여기 있나이다
[창세기 22:2] 여호와께서 이르시되 네 아들 네 독자 이삭을 데리고 모리아 땅으로 가서 내가 네게 일러 준 한 산 거기서 그를 번제로 드리라
[창세기 22:3] 아브라함이 아침에 일찍이 일어나 나귀에 안장을 지우고 두 종과 그의 아들 이삭을 데리고 번제에 쓸 나무를 쪼개어 가지고 떠나 하나님이 자기에게 일러 주신 곳으로 가더니
[창세기 22:4] 제삼일에 아브라함이 눈을 들어 그 곳을 멀리 바라본지라
[창세기 22:5] 이에 아브라함이 종들에게 이르되 너희는 나귀와 함께 여기서 기다리라 내가 아이와 함께 저기 가서 예배하고 우리가 너희에게로 돌아오리라 하고
[창세기 22:15] 여호와의 사자가 하늘에서부터 두 번째 아브라함을 불러
[창세기 22:16] 이르시되 여호와께서 이르시기를 내가 나를 가리켜 맹세하노니 네가 이같이 행하여 네 아들 네 독자도 아끼지 아니하였은즉
[창세기 22:17] 내가 네게 큰 복을 주고 네 씨가 크게 번성하여 하늘의 별과 같고 바닷가의 모래와 같게 하리니 네 씨가 그 대적의 성문을 차지하리라
[창세기 22:18] 또 네 씨로 말미암아 천하 만민이 복을 받으리니 이는 네가 나의 말을 준행하였음이니라 하셨다 하니라
[신명기 6:4] 이스라엘아 들으라 우리 하나님 여호와는 오직 유일한 여호와이시니
[신명기 6:5] 너는 마음을 다하고 뜻을 다하고 힘을 다하여 네 하나님 여호와를 사랑하라
[신명기 6:6] 오늘 내가 네게 명하는 이 말씀을 너는 마음에 새기고
[신명기 6:7] 네 자녀에게 부지런히 가르치며 집에 앉았을 때에든지 길을 갈 때에든지 누워 있을 때에든지 일어날 때에든지 이 말씀을 강론할 것이며
[신명기 6:8] 너는 또 그것을 네 손목에 매어 기호를 삼으며 네 미간에 붙여 표로 삼고
[신명기 6:9] 또 네 집 문설주와 바깥 문에 기록할지니라
[여호수아 1:5] 네 평생에 너를 능히 대적할 자가 없으리니 내가 모세와 함께 있었던 것 같이 너와 함께 있을 것임이니라 내가 너를 떠나지 아니하며 버리지 아니하리니
[여호수아 1:6] 강하고 담대하라 너는 내가 그들의 조상에게 맹세하여 그들에게 주리라 한 땅을 이 백성에게 차지하게 하리라
[여호수아 1:7] 오직 강하고 극히 담대하여 나의 종 모세가 네게 명령한 그 율법을 다 지켜 행하고 우로나 좌로나 치우치지 말라 그리하면 어디로 가든지 형통하리니

구약 — 잠언 & 전도서: 지혜와 인생의 본질

[잠언 1:3] 지혜롭게, 공의롭게, 정의롭게, 정직하게 행할 일에 대하여 훈계를 받게 하며
[잠언 1:4] 어리석은 자를 슬기롭게 하며 젊은 자에게 지식과 근신함을 주기 위한 것이니
[잠언 1:5] 지혜 있는 자는 듣고 학식이 더할 것이요 명철한 자는 지략을 얻을 것이라

[잠언 1:7] 여호와를 경외하는 것이 지식의 근본이거늘 미련한 자는 지혜와 훈계를 멸시하느니라
[잠언 2:1] 내 아들아 네가 만일 나의 말을 받으며 나의 계명을 네게 간직하며
[잠언 2:2] 네 귀를 지혜에 기울이며 네 마음을 명철에 두며
[잠언 2:3] 지식을 불러 구하며 명철을 얻으려고 소리를 높이며
[잠언 2:4] 은을 구하는 것 같이 그것을 구하며 감추어진 보배를 찾는 것 같이 그것을 찾으면
[잠언 2:5] 여호와 경외하기를 깨달으며 하나님을 알게 되리니
[잠언 8:22] 여호와께서 그 조화의 시작 곧 태초에 일하시기 전에 나를 가지셨으며
[잠언 8:23] 만세 전부터, 태초부터, 땅이 생기기 전부터 내가 세움을 받았나니
[잠언 8:24] 아직 바다가 생기지 아니하였고 큰 샘들이 있기 전에 내가 이미 났으며
[잠언 8:25] 산이 세워지기 전에, 언덕이 생기기 전에 내가 이미 났으니
[잠언 8:30] 내가 그 곁에 있어서 창조자가 되어 날마다 그의 기뻐하신 바가 되었으며 항상 그 앞에서 즐거워하였으며
[잠언 8:31] 사람이 거처할 땅에서 즐거워하며 인자들을 기뻐하였느니라
[전도서 3:1] 범사에 기한이 있고 천하 만사가 다 때가 있나니
[전도서 3:2] 날 때가 있고 죽을 때가 있으며 심을 때가 있고 심은 것을 뽑을 때가 있으며
[전도서 3:3] 죽일 때가 있고 치료할 때가 있으며 헐 때가 있고 세울 때가 있으며
[전도서 3:4] 울 때가 있고 웃을 때가 있으며 슬퍼할 때가 있고 춤출 때가 있으며
[전도서 3:5] 돌을 던져 버릴 때가 있고 돌을 거둘 때가 있으며 안을 때가 있고 안는 일을 멀리 할 때가 있으며
[전도서 3:11] 하나님이 모든 것을 지으시되 때를 따라 아름답게 하셨고 또 사람들에게는 영원을 사모하는 마음을 주셨느니라 그러나 하나님이 하시는 일의 시종을 사람으로 측량할 수 없게 하셨도다
[전도서 3:12] 사람들이 사는 동안에 기뻐하며 선을 행하는 것보다 더 나은 것이 없는 줄을 내가 알았고
[전도서 3:13] 사람마다 먹고 마시는 것과 수고함으로 낙을 누리는 그것이 하나님의 선물인 줄도 또한 알았도다
[전도서 3:14] 하나님께서 행하시는 모든 것은 영원히 있을 것이라 그 위에 더할 수도 없고 그것에서 덜할 수도 없나니 하나님이 이같이 행하심은 사람들이 그의 앞에서 경외하게 하려 하심인 줄을 내가 알았도다
[전도서 3:15] 이제 있는 것이 옛적에 있었고 장래에 있을 것도 옛적에 있었나니 하나님은 이미 지난 것을 다시 찾으시느니라
[전도서 12:1] 너는 청년의 때에 너의 창조주를 기억하라 곧 곤고한 날이 이르기 전에, 나는 아무 낙이 없다고 할 해들이 가깝기 전에
[전도서 12:2] 해와 빛과 달과 별들이 어둡기 전에, 비 뒤에 구름이 다시 일어나기 전에 그리하라
[전도서 12:7] 흙은 여전히 땅으로 돌아가고 영은 그것을 주신 하나님께로 돌아가기 전에 기억하라
[전도서 12:13] 일의 결국을 다 들었으니 하나님을 경외하고 그의 명령들을 지킬지어다 이것이 모든 사람의 본분이니라
[전도서 12:14] 하나님은 모든 행위와 모든 은밀한 일을 선악 간에 심판하시리라

구약 — 사명과 선지자의 외침
[이사야 6:1] 웃시야 왕이 죽던 해에 내가 본즉 주께서 높이 들린 보좌에 앉으셨는데 그의 옷자락은 성전에 가득하였고

[예레미야 33:1] 예레미야가 아직 시위대 뜰에 갇혀 있을 때에 여호와의 말씀이 그에게 두 번째로 임하니라 이르시되
[예레미야 33:2] 일을 행하시는 여호와, 그것을 만들며 성취하시는 여호와, 그의 이름을 여호와라 하는 이가 이와 같이 이르시도다
[예레미야 33:3] 너는 내게 부르짖으라 내가 네게 응답하겠고 네가 알지 못하는 크고 은밀한 일을 네게 보이리라
[미가 6:6] 내가 무엇을 가지고 여호와 앞에 나아가며 높으신 하나님께 경배할까 내가 번제물로 일 년 된 송아지를 가지고 그 앞에 나아갈까
[미가 6:7] 여호와께서 천천의 숫양이나 만만의 강물 같은 기름을 기뻐하실까 내 허물을 위하여 내 맏아들을, 내 영혼의 죄로 말미암아 내 몸의 열매를 드릴까
[미가 6:8] 사람아 주께서 선한 것이 무엇임을 네게 보이셨나니 여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐

신약 — 복음서: 예수님의 초청과 구원
[마태복음 11:28] 수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라
[마태복음 11:29] 나는 마음이 온유하고 겸손하니 나의 멍에를 메고 내게 배우라 그리하면 너희 마음이 쉼을 얻으리니
[마태복음 11:30] 이는 내 멍에는 쉽고 내 짐은 가벼움이라 하시니라
[요한복음 3:16] 하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니 이는 그를 믿는 자마다 멸망하지 않고 영생을 얻게 하려 하심이라
[요한복음 14:6] 예수께서 이르시되 내가 곧 길이요 진리요 생명이니 나로 말미암지 않고는 아버지께로 올 자가 없느니라
[요한복음 15:1] 나는 참포도나무요 내 아버지는 농부라
[요한복음 15:2] 무릇 내게 붙어 있어 열매를 맺지 아니하는 가지는 아버지께서 그것을 제거해 버리시고 무릇 열매를 맺는 가지는 더 열매를 맺게 하려 하여 그것을 깨끗하게 하시느니라
[요한복음 15:4] 내 안에 거하라 나도 너희 안에 거하리라 가지가 포도나무에 붙어 있지 아니하면 스스로 열매를 맺을 수 없음 같이 너희도 내 안에 있지 아니하면 그러하리라
[요한복음 15:5] 나는 포도나무요 너희는 가지라 그가 내 안에, 내가 그 안에 거하면 사람이 열매를 많이 맺나니 나를 떠나서는 너희가 아무 것도 할 수 없음이라
[요한복음 15:7] 너희가 내 안에 거하고 내 말이 너희 안에 거하면 무엇이든지 원하는 대로 구하라 그리하면 이루리라
[요한복음 15:8] 너희가 열매를 많이 맺으면 내 아버지께서 영광을 받으실 것이요 너희는 내 제자가 되리라
[요한복음 15:9] 아버지께서 나를 사랑하신 것 같이 나도 너희를 사랑하였으니 나의 사랑 안에 거하라
[요한복음 15:10] 내가 아버지의 계명을 지켜 그의 사랑 안에 거하는 것 같이 너희도 내 계명을 지키면 내 사랑 안에 거하리라
[요한복음 15:11] 내가 이것을 너희에게 이름은 내 기쁨이 너희 안에 있어 너희 기쁨을 충만하게 하려 함이라
[요한복음 15:12] 내 계명은 곧 내가 너희를 사랑한 것 같이 너희도 서로 사랑하라 하는 이것이니라
[요한복음 15:13] 사람이 친구를 위하여 자기 목숨을 버리면 이보다 더 큰 사랑이 없나니
[요한복음 15:16] 너희가 나를 택한 것이 아니요 내가 너희를 택하여 세웠나니 이는 너희로 가서 열매를 맺게 하고 또 너희 열매가 항상 있게 하여 내 이름으로 아버지께 무엇을 구하든지 다 받게 하려 함이라

신약 — 산상보훈 (마태복음 5-7장)

[마태복음 5:5] 온유한 자는 복이 있나니 그들이 땅을 기업으로 받을 것임이요
[마태복음 5:6] 의에 주리고 목마른 자는 복이 있나니 그들이 배부를 것임이요
[마태복음 5:7] 긍휼히 여기는 자는 복이 있나니 그들이 긍휼히 여김을 받을 것임이요
[마태복음 5:8] 마음이 청결한 자는 복이 있나니 그들이 하나님을 볼 것임이요
[마태복음 5:9] 화평하게 하는 자는 복이 있나니 그들이 하나님의 아들이라 일컬음을 받을 것임이요
[마태복음 5:10] 의를 위하여 박해를 받은 자는 복이 있나니 천국이 그들의 것임이라

[마태복음 5:14] 너희는 세상의 빛이라 산 위에 있는 동네가 숨겨지지 못할 것이요
[마태복음 5:16] 이같이 너희 빛이 사람 앞에 비치게 하여 그들로 너희 착한 행실을 보고 하늘에 계신 너희 아버지께 영광을 돌리게 하라
[마태복음 5:44] 나는 너희에게 이르노니 너희 원수를 사랑하며 너희를 박해하는 자를 위하여 기도하라
[마태복음 5:48] 그러므로 하늘에 계신 너희 아버지의 온전하심과 같이 너희도 온전하라
[마태복음 6:9] 그러므로 너희는 이렇게 기도하라 하늘에 계신 우리 아버지여 이름이 거룩히 여김을 받으시오며
[마태복음 6:10] 나라가 임하시오며 뜻이 하늘에서 이루어진 것 같이 땅에서도 이루어지이다
[마태복음 6:11] 오늘 우리에게 일용할 양식을 주시옵고

[마태복음 6:13] 우리를 시험에 들게 하지 마시옵고 다만 악에서 구하시옵소서

[마태복음 7:12] 그러므로 무엇이든지 남에게 대접을 받고자 하는 대로 너희도 남을 대접하라 이것이 율법이요 선지자니라
[마태복음 7:24] 그러므로 누구든지 나의 이 말을 듣고 행하는 자는 그 집을 반석 위에 지은 지혜로운 사람 같으리니
[마태복음 7:25] 비가 내리고 창수가 나고 바람이 불어 그 집에 부딪치되 무너지지 아니하나니 이는 주추를 반석 위에 놓은 까닭이요

신약 — 로마서: 복음의 확신과 삶
[로마서 8:1] 그러므로 이제 그리스도 예수 안에 있는 자에게는 결코 정죄함이 없나니
[로마서 8:2] 이는 그리스도 예수 안에 있는 생명의 성령의 법이 죄와 사망의 법에서 너를 해방하였음이라
[로마서 8:3] 율법이 육신으로 말미암아 연약하여 할 수 없는 그것을 하나님은 하시나니 곧 죄로 말미암아 자기 아들을 죄 있는 육신의 모양으로 보내어 육신에 죄를 정하사
[로마서 8:4] 육신을 따르지 않고 그 영을 따라 행하는 우리에게 율법의 요구가 이루어지게 하려 하심이니라
[로마서 8:5] 육신을 따르는 자는 육신의 일을, 영을 따르는 자는 영의 일을 생각하나니
[로마서 8:26] 이와 같이 성령도 우리의 연약함을 도우시나니 우리는 마땅히 기도할 바를 알지 못하나 오직 성령이 말할 수 없는 탄식으로 우리를 위하여 친히 간구하시느니라
[로마서 8:27] 마음을 살피시는 이가 성령의 생각을 아시나니 이는 성령이 하나님의 뜻대로 성도를 위하여 간구하심이니라
[로마서 8:28] 우리가 알거니와 하나님을 사랑하는 자 곧 그의 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라
[로마서 8:29] 하나님이 미리 아신 자들을 또한 그 아들의 형상을 본받게 하기 위하여 미리 정하셨으니 이는 그로 많은 형제 중에서 맏아들이 되게 하려 하심이니라
[로마서 8:30] 또 미리 정하신 그들을 또한 부르시고 부르신 그들을 또한 의롭다 하시고 의롭다 하신 그들을 또한 영화롭게 하셨느니라
[로마서 8:35] 누가 우리를 그리스도의 사랑에서 끊으리요 환난이나 곤고나 박해나 기근이나 적신이나 위험이나 칼이랴
[로마서 8:37] 그러나 이 모든 일에 우리를 사랑하시는 이로 말미암아 우리가 넉넉히 이기느니라
[로마서 8:38] 내가 확신하노니 사망이나 생명이나 천사들이나 권세자들이나 현재 일이나 장래 일이나 능력이나
[로마서 8:39] 높음이나 깊음이나 다른 어떤 피조물이라도 우리를 우리 주 그리스도 예수 안에 있는 하나님의 사랑에서 끊을 수 없으리라
[로마서 12:1] 그러므로 형제들아 내가 하나님의 모든 자비하심으로 너희를 권하노니 너희 몸을 하나님이 기뻐하시는 거룩한 산 제물로 드리라 이는 너희가 드릴 영적 예배니라
[로마서 12:2] 너희는 이 세대를 본받지 말고 오직 마음을 새롭게 함으로 변화를 받아 하나님의 선하시고 기뻐하시고 온전하신 뜻이 무엇인지 분별하도록 하라
[로마서 12:9] 사랑에는 거짓이 없나니 악을 미워하고 선에 속하라
[로마서 12:10] 형제를 사랑하여 서로 우애하고 존경하기를 서로 먼저 하며
[로마서 12:11] 부지런하여 게으르지 말고 열심을 품고 주를 섬기라
[로마서 12:12] 소망 중에 즐거워하며 환난 중에 참으며 기도에 항상 힘쓰며
[로마서 12:13] 성도들의 쓸 것을 공급하며 손 대접하기를 힘쓰라
[로마서 12:14] 너희를 박해하는 자를 축복하라 축복하고 저주하지 말라
[로마서 12:15] 즐거워하는 자들과 함께 즐거워하고 우는 자들과 함께 울라
[로마서 12:16] 서로 마음을 같이하며 높은 데 마음을 두지 말고 도리어 낮은 데 처하며 스스로 지혜 있는 체 하지 말라
[로마서 12:18] 할 수 있거든 너희로서는 모든 사람과 더불어 화목하라
[로마서 12:21] 악에게 지지 말고 선으로 악을 이기라

신약 — 에베소서 & 빌립보서 & 골로새서
[에베소서 2:4] 긍휼이 풍성하신 하나님이 우리를 사랑하신 그 큰 사랑을 인하여
[에베소서 2:5] 허물로 죽은 우리를 그리스도와 함께 살리셨고 (너희는 은혜로 구원을 받은 것이라)
[에베소서 2:8] 너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라
[에베소서 2:9] 행위에서 난 것이 아니니 이는 누구든지 자랑하지 못하게 함이라

[에베소서 2:19] 그러므로 이제부터 너희는 외인도 아니요 나그네도 아니요 오직 성도들과 동일한 시민이요 하나님의 권속이라
[에베소서 2:20] 너희는 사도들과 선지자들의 터 위에 세우심을 입은 자라 그리스도 예수께서 친히 모퉁잇돌이 되셨느니라
[에베소서 6:11] 마귀의 간계를 능히 대적하기 위하여 하나님의 전신 갑주를 입으라
[에베소서 6:12] 우리의 씨름은 혈과 육을 상대하는 것이 아니요 통치자들과 권세들과 이 어둠의 세상 주관자들과 하늘에 있는 악의 영들을 상대함이라
[에베소서 6:13] 그러므로 하나님의 전신 갑주를 취하라 이는 악한 날에 너희가 능히 대적하고 모든 일을 행한 후에 서기 위함이라
[에베소서 6:14] 그런즉 서서 진리로 너희 허리 띠를 띠고 의의 호심경을 붙이고
[에베소서 6:15] 평안의 복음이 준비한 것으로 신을 신고
[에베소서 6:16] 모든 것 위에 믿음의 방패를 가지고 이로써 능히 악한 자의 모든 불화살을 소멸하고
[에베소서 6:17] 구원의 투구와 성령의 검 곧 하나님의 말씀을 가지라

/* ══════════════════════════════════════
   파싱 & 카드 생성
══════════════════════════════════════ */
const NT_BOOKS = ['마태복음','마가복음','누가복음','요한복음','사도행전','로마서','고린도','갈라디아','에베소','빌립보','골로새','데살로니가','디모데','디도','빌레몬','히브리서','야고보서','베드로','요한서','유다서','요한계시록'];
function isNT(ref){ return NT_BOOKS.some(b=>ref.includes(b)); }

const CHUNK = 5;

function parseText(txt){
  const sections=[];
  let cur=null;
  txt.split('\n').forEach(raw=>{
    const line=raw.trim();
    if(!line){
      if(cur && cur.verses.length>0 && cur.verses[cur.verses.length-1].type!=='break')
        cur.verses.push({type:'break'});
      return;
    }
    if(/^(구약|신약|\d+\.)/.test(line) && !line.startsWith('[')){
      cur={title:line.replace(/^\d+\.\s*/,''), verses:[]};
      sections.push(cur);
      return;
    }
    const m=line.match(/^\[(.+?)\]\s*(.*)/);
    if(m && cur) cur.verses.push({ref:m[1], txt:m[2], type:'verse'});
  });
  return sections;
}

function getBookChapter(ref){
  if(!ref) return '';
  const m=ref.match(/^([^:\d]+)\s*(\d+)/);
  return m ? m[1].trim()+' '+m[2] : ref;
}

function makeCards(sections){
  const cards=[];
  sections.forEach(sec=>{
    const vs=sec.verses;
    let cur=[], lastKey=null;
    for(let i=0;i<vs.length;i++){
      const item=vs[i];
      if(item.type==='break'){
        if(cur.length>0){ cards.push({section:sec.title, verses:cur}); cur=[]; lastKey=null; }
        continue;
      }
      const key=getBookChapter(item.ref);
      const bookChanged = lastKey && key!==lastKey && !key.startsWith(lastKey.split(' ')[0]);
      if(lastKey && (bookChanged || cur.length>=CHUNK)){
        let lookahead=0;
        for(let j=i;j<vs.length;j++){
          if(vs[j].type==='break') break;
          if(getBookChapter(vs[j].ref)===key) lookahead++;
          else break;
        }
        if(!bookChanged && lookahead<=2 && (cur.length+lookahead)<=7){
          /* 합치기 */
        } else {
          cards.push({section:sec.title, verses:cur}); cur=[];
        }
      }
      cur.push({ref:item.ref, txt:item.txt});
      lastKey=key;
    }
    if(cur.length>0) cards.push({section:sec.title, verses:cur});
  });
  return cards;
}

const LS='bible_verses_v1', LS_DONE='bible_mem_done_v1';
let rawText=localStorage.getItem(LS)||DEFAULT_TEXT;
let sections=parseText(rawText);
let cards=makeCards(sections);
let cur=0, mode='med';
let memDoneSet=new Set(JSON.parse(localStorage.getItem(LS_DONE)||'[]'));

function buildSelect(){
  const sel=document.getElementById('grpSel');
  sel.innerHTML='';
  const map={};
  cards.forEach((c,i)=>{ if(!map[c.section]) map[c.section]=[]; map[c.section].push(i); });
  Object.keys(map).forEach(sec=>{
    const og=document.createElement('optgroup'); og.label=sec;
    map[sec].forEach(ci=>{
      const c=cards[ci], opt=document.createElement('option');
      opt.value=ci;
      // 카드 레이블: 첫 절 ~ 마지막 절 (책이름 중복 제거)
      const first=c.verses[0].ref, last=c.verses[c.verses.length-1].ref;
      const firstBook=getBookChapter(first);
      const lastVerse=last.split(':')[1];
      const firstVerse=first.split(':')[1];
      opt.textContent = first===last ? first : `${first}–${lastVerse}절`;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
  sel.value=cur;
}

function render(){
  const wrap=document.getElementById('cardWrap');
  if(!cards.length){
    wrap.innerHTML='<div class="empty-msg">구절이 없습니다.<br>아래 편집 패널에서 추가하세요.</div>';
    return;
  }
  const c=cards[cur];
  const memCls=mode==='mem'?' mem-mode':'';
  const doneLit=memDoneSet.has(cur)?'lit':'';

  // 구절 주소: 책+장은 첫 절에만, 같은 장 내 이후 절은 절 번호만
  let prevBookCh='';
  const rows=c.verses.map(v=>{
    const nt=isNT(v.ref);
    const cls=nt?'nt':'ot';
    const bookCh=getBookChapter(v.ref);
    const verseNum=v.ref.split(':')[1];
    // 표시할 주소: 책+장이 바뀌면 전체, 같으면 절만
    let displayRef;
    if(bookCh!==prevBookCh){
      displayRef=v.ref;
      prevBookCh=bookCh;
    } else {
      displayRef=verseNum+'절';
    }
    return `<div class="verse-card ${cls}" onclick="toggleRev(this)">
      <div class="v-ref">${displayRef}</div>
      <div class="v-txt">${v.txt}</div>
      <div class="mem-hint">👆 탭하면 보입니다</div>
    </div>`;
  }).join('');

  wrap.innerHTML=`
    <div class="sec-badge"><span class="sec-dot"></span>${c.section}</div>
    <div id="cardsInner" class="${memCls}">${rows}</div>
    <div class="card-footer">
      <button class="ft-btn reveal" onclick="revealAll()">🔓 모두 보기</button>
      <button class="ft-btn reveal" onclick="hideAll()">🔒 모두 숨기기</button>
      <button class="ft-btn done-btn ${doneLit}" onclick="toggleDone(${cur})">🔥 다 외었다!</button>
    </div>
    <div class="edit-wrap">
      <button class="edit-toggle" onclick="toggleEdit()">
        ✏️ 구절 관리
        <span id="eArr" style="margin-left:auto">▼</span>
      </button>
      <div class="edit-body" id="editBody">
        <div class="edit-note">
          <b>성경주소만 입력</b> — 본문은 자동으로 채워집니다.<br>
          섹션: <code>구약 — 제목</code> 또는 <code>신약 — 제목</code><br>
          구절: <code>[시편 23:1]</code>, <code>[요한복음 3:16]</code><br>
          💡 빈 줄로 카드를 나눌 수 있습니다.
        </div>
        <textarea id="vtArea"></textarea>
        <div class="edit-acts">
          <button class="btn-ok" onclick="applyEditFromRef()">✓ 적용</button>
          <button class="btn-rst" onclick="resetDef()">↺ 기본값</button>
          <span id="fetchStatus"></span>
        </div>
      </div>
    </div>`;

  // 카드 순서 애니메이션 지연
  wrap.querySelectorAll('.verse-card').forEach((el,i)=>{
    el.style.animationDelay=`${i*30}ms`;
  });

  document.getElementById('ctr').textContent=`${cur+1}/${cards.length}`;
  document.getElementById('bPrev').disabled=cur===0;
  document.getElementById('bNext').disabled=cur===cards.length-1;
  document.getElementById('grpSel').value=cur;
  wrap.scrollTop=0;
}

function toggleRev(el){ el.classList.toggle('rev'); }
function revealAll(){ document.querySelectorAll('#cardsInner .verse-card').forEach(el=>el.classList.add('rev')); }
function hideAll(){   document.querySelectorAll('#cardsInner .verse-card').forEach(el=>el.classList.remove('rev')); }

function nav(d){
  cur=Math.max(0,Math.min(cards.length-1,cur+d));
  render();
}
function selGroup(i){ cur=i; render(); }
function setMode(m){
  mode=m;
  document.getElementById('bMed').classList.toggle('on',m==='med');
  document.getElementById('bMem').classList.toggle('on',m==='mem');
  render();
}
function toggleDone(idx){
  if(memDoneSet.has(idx)) memDoneSet.delete(idx);
  else memDoneSet.add(idx);
  localStorage.setItem(LS_DONE,JSON.stringify([...memDoneSet]));
  const btn=document.querySelector('.done-btn');
  if(btn) btn.classList.toggle('lit',memDoneSet.has(idx));
}

/* ══════════════════════════════════════
   편집 패널
══════════════════════════════════════ */
function toggleEdit(){
  const b=document.getElementById('editBody');
  const a=document.getElementById('eArr');
  if(b.classList.toggle('open')){
    const refOnly=rawText.split('\n').map(line=>{
      const m=line.match(/^\[(.+?)\]/);
      return m?`[${m[1]}]`:line;
    }).join('\n');
    document.getElementById('vtArea').value=refOnly;
    a.textContent='▲';
  } else { a.textContent='▼'; }
}

async function applyEditFromRef(){
  const raw=document.getElementById('vtArea').value;
  const status=document.getElementById('fetchStatus');
  status.textContent='⏳ 가져오는 중...';
  const lines=raw.split('\n');
  const result=[]; let fetched=0, missed=0;
  for(const rawLine of lines){
    const line=rawLine.trim();
    if(!line){ result.push(''); continue; }
    if(/^(구약|신약|\d+\.)/.test(line)&&!line.startsWith('[')){ result.push(line); continue; }
    const m=line.match(/^\[(.+?)\](\s*.+)?$/);
    if(m){
      const ref=m[1].trim(), existing=m[2]?m[2].trim():'';
      if(existing){ result.push(`[${ref}] ${existing}`); continue; }
      const txt=await lookupVerse(ref);
      if(txt){ result.push(`[${ref}] ${txt}`); fetched++; }
      else { result.push(`[${ref}] ⚠️ 찾지 못했습니다`); missed++; }
    } else { result.push(line); }
  }
  rawText=result.join('\n');
  localStorage.setItem(LS,rawText);
  sections=parseText(rawText); cards=makeCards(sections); cur=0;
  buildSelect(); render();
  document.getElementById('vtArea').value=rawText.split('\n').map(l=>{ const m=l.match(/^\[(.+?)\]/); return m?`[${m[1]}]`:l; }).join('\n');
  status.textContent=`✓ ${fetched}절${missed>0?` / ⚠️ ${missed}절 미발견`:''}`;
  showToast('✓ 적용되었습니다');
}

/* ── 성경 JSON 설정 ── */
const LS_BIBLE = 'memo_bible_kjv';
let _bibleData = null;

async function getBibleData(){
  if(_bibleData) return _bibleData;
  try {
    const raw = localStorage.getItem(LS_BIBLE);
    if(raw){ _bibleData = JSON.parse(raw); return _bibleData; }
  } catch(e){}
  return null;
}

async function uploadBibleJson(input){
  const file = input.files[0];
  if(!file) return;
  const st = document.getElementById('bset-status');
  st.textContent = '⏳ 읽는 중...'; st.className = 'bset-status';
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    // 형식 정규화
    let verses = [];
    if(Array.isArray(data)){
      if(data[0] && data[0].text !== undefined){ verses = data; }
      else if(data[0] && data[0].chapters){
        data.forEach((b,bi)=>{
          const bk = b.name||b.abbrev||b.book||'';
          (b.chapters||[]).forEach((ch,ci)=>{
            (Array.isArray(ch)?ch:(ch.verses||[])).forEach((v,vi)=>{
              verses.push({book:bk,chapter:ci+1,verse:vi+1,text:typeof v==='string'?v:v.text||''});
            });
          });
        });
      }
    } else if(data.verses){ verses = data.verses; }
    if(!verses.length) throw new Error('인식할 수 없는 형식입니다.');
    const norm = {verses, bookNames: data.bookNames||{}};
    localStorage.setItem(LS_BIBLE, JSON.stringify(norm));
    _bibleData = norm;
    st.textContent = '✓ '+verses.length+'절 등록됨'; st.className = 'bset-status ok';
    showToast('✓ 개역개정 등록 완료');
  } catch(e){
    st.textContent = '오류: '+e.message; st.className = 'bset-status';
  }
  input.value = '';
}

function deleteBibleJson(){
  if(!confirm('개역개정 데이터를 삭제할까요?')) return;
  localStorage.removeItem(LS_BIBLE);
  _bibleData = null;
  const st = document.getElementById('bset-status');
  if(st){ st.textContent = '미등록'; st.className = 'bset-status'; }
  showToast('🗑 삭제됨');
}

async function openBibleSetting(){
  const overlay = document.getElementById('bsetOverlay');
  overlay.classList.add('open');
  const st = document.getElementById('bset-status');
  const data = await getBibleData();
  if(data && data.verses){
    st.textContent = '✓ '+data.verses.length+'절 등록됨'; st.className = 'bset-status ok';
  } else {
    st.textContent = '미등록'; st.className = 'bset-status';
  }
}
function closeBibleSetting(){ document.getElementById('bsetOverlay').classList.remove('open'); }

async function lookupVerse(ref){
  // 1순위: 현재 편집 구절에서
  for(const sec of sections) for(const v of sec.verses) if(v.ref===ref&&v.txt) return v.txt;
  // 2순위: 기본 내장 구절에서
  const defSecs=parseText(DEFAULT_TEXT);
  for(const sec of defSecs) for(const v of sec.verses) if(v.ref===ref&&v.txt) return v.txt;
  // 3순위: 업로드된 개역개정 JSON에서
  const bible = await getBibleData();
  if(bible) return findInBible(bible, ref);
  return null;
}

function findInBible(bible, ref){
  const m = ref.match(/^(.+?)\s+(\d+):(\d+)$/);
  if(!m) return null;
  const [,bookName,chStr,vsStr] = m;
  const ch = Number(chStr), vs = Number(vsStr);
  const aliases = new Set([bookName]);
  if(bible.bookNames){
    Object.entries(bible.bookNames).forEach(([a,f])=>{
      if(a===bookName||f===bookName){ aliases.add(a); aliases.add(f); }
    });
  }
  for(const v of bible.verses){
    if(aliases.has(v.book)&&Number(v.chapter)===ch&&Number(v.verse)===vs) return v.text||null;
  }
  return null;
}

function resetDef(){
  if(!confirm('기본 구절로 복원할까요?')) return;
  rawText=DEFAULT_TEXT; localStorage.setItem(LS,rawText);
  sections=parseText(rawText); cards=makeCards(sections); cur=0;
  buildSelect(); render(); showToast('↺ 기본값으로 복원했습니다');
}
